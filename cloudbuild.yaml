steps:
  # 1. Build the .NET 10 image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/my-app:$_TAG', '.']
    dir: 'app'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/my-app:$_TAG']

  # 3. Update the Kustomize manifests and push to Git
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        # Fetch the token from Secret Manager
        TOKEN=$(gcloud secrets versions access latest --secret="git-token")
        
        # Clone the repository to get .git context
        git clone https://x-access-token:$${TOKEN}@github.com/$_GITHUB_USER/$_GITHUB_REPO.git repo
        cd repo
        
        # Configure Git
        git config --global user.email "cloudbuild@google.com"
        git config --global user.name "Cloud Build"
        
        # Update image repository and tag in values.yaml
        sed -i "s|repository: .*|repository: $_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/my-app|" chart/values.yaml
        sed -i "s/tag: .*/tag: $_TAG/" chart/values.yaml
        
        # Update repoURL in ArgoCD manifests
        REPO_URL="https://github.com/$_GITHUB_USER/$_GITHUB_REPO.git"
        sed -i "s|repoURL: .*|repoURL: $$REPO_URL|" argocd/tenant-a-app.yaml
        sed -i "s|repoURL: .*|repoURL: $$REPO_URL|" argocd/tenant-b-app.yaml
        
        # Commit changes
        git add .
        git commit -m "chore: update image tag and repoURL to $_TAG [skip ci]"
        
        # Push back
        git push origin HEAD:main

substitutions:
  _REGION: us-central1
  _REPO_NAME: my-app-repo
  _TAG: latest
  _GITHUB_USER: your-github-username
  _GITHUB_REPO: your-github-repo
